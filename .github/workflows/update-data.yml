name: Update Euroleague data

on:
  schedule:
    # каждую ночь в 03:15 UTC (после того как обычно уже все матчи
    # дня сыграны и статистика на стороне Euroleague обновилась)
    - cron: "15 3 * * *"
  workflow_dispatch: {}  # + кнопка "Run workflow" в интерфейсе GitHub, ручной запуск когда захочешь

permissions:
  contents: write  # нужно, чтобы workflow мог закоммитить обновлённые data/*.json обратно в репозиторий

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install euroleague_api pandas

      - name: Run data pipeline
        run: python fetch_euroleague_data.py

      - name: Commit updated data
        run: |
          git config user.name "euroleague-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/*.json
          git diff --cached --quiet && echo "Нет изменений — пропускаю коммит" || \
            git commit -m "Auto-update Euroleague data $(date -u +'%Y-%m-%d')"
          git push
