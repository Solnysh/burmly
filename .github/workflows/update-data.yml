name: Update Euroleague data

on:
  schedule:
    - cron: "15 3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install euroleague_api pandas

      - name: Run data pipeline
        run: python fetch_euroleague_data.py

      - name: Commit updated data
        if: always()
        run: |
          git config user.name "euroleague-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/*.json
          git diff --cached --quiet && echo "Нет изменений — пропускаю коммит" || \
            git commit -m "Auto-update Euroleague data $(date -u +'%Y-%m-%d')"
          git push
